on:
  push:
    paths: ['**.Rmd']

name: render-rmarkdown

jobs:
  render-rmarkdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rmarkdown

      - name: Render Rmarkdown files and commit results
        shell: bash
        run: |
          mapfile -t RMD_PATH < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '[.]Rmd$' || true)

          if [ ${#RMD_PATH[@]} -eq 0 ]; then
            echo "No changed Rmd files."
            exit 0
          fi

          Rscript -e 'for (f in commandArgs(TRUE)) if (file.exists(f)) rmarkdown::render(f)' "${RMD_PATH[@]}"

          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add "${RMD_PATH[@]/.Rmd/.md}"
          git commit -m "Re-build Rmarkdown files" || echo "No changes to commit"
          git push
